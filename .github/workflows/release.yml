name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore WebView2 SDK
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.2592.51 -OutputDirectory webview2sdk
        shell: cmd

      - name: Configure
        run: cmake -S . -B build -A x64 -DWV2_SDK="${{ github.workspace }}\webview2sdk\Microsoft.Web.WebView2.1.0.2592.51"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        run: |
          mkdir release
          copy build\bin\Release\YMHub.exe release\YMHub.exe
          copy build\bin\Release\YMHubDll.dll release\YMHubDll.dll
        shell: cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/YMHub.exe
            release/YMHubDll.dll
          generate_release_notes: true
